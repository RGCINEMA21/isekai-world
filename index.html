<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ISEKAI WORLD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;color:#fff;font-family:'Segoe UI',Arial,sans-serif}
#canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(24px,6vw,48px);margin-bottom:8px;color:#f0c040}
#overlay p{font-size:clamp(12px,3vw,16px);color:#aaa;margin-bottom:16px}
#bar-wrap{width:80%;max-width:400px;height:12px;background:#333;border-radius:6px;overflow:hidden}
#bar{height:100%;width:0%;background:linear-gradient(90deg,#4CAF50,#8BC34A);border-radius:6px;transition:width .3s}
#pct{margin-top:8px;font-size:clamp(11px,2.5vw,14px);color:#8BC34A}
#msg{margin-top:16px;font-size:clamp(11px,2.5vw,14px);color:#e57373;display:none;max-width:90%;text-align:center}
#retry{margin-top:12px;padding:10px 24px;background:#4CAF50;color:#fff;border:none;border-radius:8px;font-size:16px;display:none;cursor:pointer}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
<h1>ISEKAI WORLD</h1>
<p>Loading game engine...</p>
<div id="bar-wrap"><div id="bar"></div></div>
<div id="pct">0%</div>
<div id="msg"></div>
<button id="retry" onclick="location.reload()">Retry</button>
</div>
<script src="index.js?v=4"></script>
<script>
var bar=document.getElementById('bar'),pct=document.getElementById('pct'),msg=document.getElementById('msg'),retry=document.getElementById('retry'),ov=document.getElementById('overlay');
function setProgress(c,t){if(c>0&&t>0){var p=Math.round(c/t*100);bar.style.width=p+'%';pct.textContent=p+'% ('+Math.round(c/1048576)+'MB / '+Math.round(t/1048576)+'MB)';}}
function showError(e){msg.style.display='block';msg.textContent=e;retry.style.display='inline-block';pct.textContent='Failed';}
setTimeout(function(){if(ov&&!ov.classList.contains('hidden')){showError('Loading took too long. Try refreshing or use Chrome.');}},90000);
try{
var cfg={"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":116400,"index.wasm":35376909},"focusCanvas":true,"gdextensionLibs":[],"serviceWorker":""};
var eng=new Engine(cfg);
var missing=Engine.getMissingFeatures({threads:false});
if(missing.length>0){showError('Missing: '+missing.join(', '));}
else{eng.startGame({onProgress:setProgress}).then(function(){ov.classList.add('hidden');},function(e){console.error(e);showError('Engine error: '+(e.message||e));});}
}catch(e){console.error(e);showError('Error: '+(e.message||e));}
</script>
</body>
</html>
