<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<title>ISEKAI WORLD</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	touch-action: none;
	-webkit-tap-highlight-color: transparent;
}
body {
	color: white;
	background-color: #1a1a2e;
}
#canvas {
	display: block;
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
}
#canvas:focus {
	outline: none;
}
#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}
#status, #status-splash {
	top: 0;
	bottom: 0;
}
#status {
	background-color: #1a1a2e;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: visible;
	z-index: 10;
}
#status-splash {
	max-height: 60%;
	max-width: 80%;
	margin: auto;
}
#status-progress {
	display: none;
	bottom: 15%;
	width: 60%;
	margin: 0 auto;
	height: 8px;
	-webkit-appearance: none;
	appearance: none;
	background: #333;
	border-radius: 4px;
	overflow: hidden;
}
#status-progress::-webkit-progress-bar {
	background: #333;
	border-radius: 4px;
}
#status-progress::-webkit-progress-value {
	background: #4CAF50;
	border-radius: 4px;
}
#status-notice {
	display: none;
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 11;
	max-width: 90%;
}
#loading-text {
	color: #aaa;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	font-size: 14px;
	margin-top: 12px;
}
#loading-pct {
	color: #4CAF50;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	font-size: 13px;
	margin-top: 4px;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png"/>
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>
		<noscript>
			Your browser does not support JavaScript.
		</noscript>
		<div id="status">
			<img id="status-splash" src="index.png" alt="ISEKAI WORLD">
			<progress id="status-progress"></progress>
			<div id="loading-text">Loading...</div>
			<div id="loading-pct"></div>
			<div id="status-notice"></div>
		</div>
		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {
	"args":[],
	"canvasResizePolicy":2,
	"ensureCrossOriginIsolationHeaders":false,
	"executable":"index",
	"experimentalVK":false,
	"fileSizes":{"index.pck":116400,"index.wasm":35376909},
	"focusCanvas":true,
	"gdextensionLibs":[],
	"serviceWorker":""
};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const loadingText = document.getElementById('loading-text');
	const loadingPct = document.getElementById('loading-pct');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.style.visibility = 'hidden';
			statusOverlay.style.display = 'none';
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		if (loadingText) loadingText.style.display = mode === 'progress' ? 'block' : 'none';
		if (loadingPct) loadingPct.style.display = mode === 'progress' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error('[ISEKAI WORLD] Error:', err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occured');
		}
		setStatusMode('notice');
		initializing = false;
	}

	// Timeout - show error if loading takes too long
	var loadTimeout = setTimeout(function() {
		if (initializing && statusMode === 'progress') {
			setStatusNotice('Loading is taking longer than expected. Please refresh the page.\nIf this persists, try using Chrome or Firefox.');
			setStatusMode('notice');
		}
	}, 60000);

	console.log('[ISEKAI WORLD] Starting engine...');
	console.log('[ISEKAI WORLD] Threads:', GODOT_THREADS_ENABLED);

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		clearTimeout(loadTimeout);
		console.error('[ISEKAI WORLD] Missing features:', missing);
		const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
		displayFailureNotice(missingMsg + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
					var pct = Math.round((current / total) * 100);
					if (loadingPct) loadingPct.textContent = pct + '%';
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			clearTimeout(loadTimeout);
			console.log('[ISEKAI WORLD] Game started!');
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
